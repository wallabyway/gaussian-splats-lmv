<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LMV + 3DGS Splat Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css">
    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #viewer { height: calc(100% - 3.5rem); position: relative; }
    </style>
</head>
<body class="bg-gray-100">

<nav class="h-14 bg-white border-b border-gray-200 flex items-center px-4 gap-4 shadow-sm">
    <div class="flex items-center gap-3">
        <a href="https://aps.autodesk.com/blog/3dgs-meet-bim-rendering-gaussian-splats-inside-aps-viewer" target="_blank" class="text-xl font-extrabold tracking-tight text-indigo-600 select-none hover:text-indigo-800 transition-colors">BLOG</a>
        <div class="w-px h-6 bg-gray-300"></div>
        <a href="https://github.com/wallabyway/gaussian-splats-lmv" target="_blank" class="w-auto px-2 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm hover:bg-indigo-800 transition-colors">GitHub</a>
        <span class="font-semibold text-gray-800 text-lg">LMV + 3DGS Splat Demo</span>
    </div>

    <div class="flex-1"></div>

    <div class="flex items-center gap-2">
        <button id="viewA" class="px-3 py-1.5 text-sm font-medium bg-gray-100 hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 rounded-md border border-gray-300 hover:border-indigo-300 transition-colors">View A</button>
        <button id="viewB" class="px-3 py-1.5 text-sm font-medium bg-gray-100 hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 rounded-md border border-gray-300 hover:border-indigo-300 transition-colors">View B</button>
        <button id="viewC" class="px-3 py-1.5 text-sm font-medium bg-gray-100 hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 rounded-md border border-gray-300 hover:border-indigo-300 transition-colors">View C</button>
    </div>

    <span id="status" class="text-sm text-gray-500"></span>

    <select id="modelSelect" class="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white text-gray-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
        <option value="">Choose a model</option>
    </select>
</nav>

<div id="viewer"></div>

<script type="module" src="./app.mjs"></script>
</body>
</html>
